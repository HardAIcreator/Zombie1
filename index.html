<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOMBIE SURVIVAL FIXED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Arial', sans-serif; 
            color: white;
        }
        
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a3a1a, #0a2a0a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .logo {
            font-size: 80px;
            font-weight: 900;
            color: #ffaa00;
            text-shadow: 5px 5px 0 #ff0000;
            margin-bottom: 20px;
        }

        #startBtn {
            padding: 20px 80px;
            background: #00ff00;
            border: none;
            border-radius: 50px;
            color: black;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #ffff00;
            box-shadow: 0 10px 0 #008800;
            transition: 0.05s linear;
        }

        #startBtn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 #008800;
        }

        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }
        
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.8); 
            padding: 15px; 
            border-radius: 15px; 
            border: 3px solid #ffaa00; 
            z-index: 10;
            min-width: 200px;
        }
        
        #hp-bar { 
            width: 200px; 
            height: 20px; 
            background: #300; 
            border: 2px solid #f00; 
            border-radius: 10px; 
            margin: 5px 0;
            overflow: hidden;
        }
        
        #hp-fill { 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(90deg, #f00, #ff0, #0f0); 
        }

        #hunger-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            margin: 5px 0;
            overflow: hidden;
        }

        #hunger-fill {
            width: 100%;
            height: 100%;
            background: #ffaa00;
        }

        #day-night {
            font-size: 20px;
            color: #ffaa00;
            margin-bottom: 5px;
        }

        #zombie-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            border: 3px solid #f00;
            font-size: 24px;
            color: #f00;
        }

        #inventory {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 20px;
            border: 3px solid #ffaa00;
            z-index: 20;
        }

        .slot {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
            cursor: pointer;
        }

        .slot.selected {
            border-color: #00ffff;
            box-shadow: 0 0 20px #00ffff;
            transform: scale(1.05);
        }

        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 14px;
            background: #ffaa00;
            color: black;
            padding: 2px 5px;
            border-radius: 10px;
        }

        #craft-menu {
            position: absolute;
            bottom: 100px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #ffaa00;
            width: 250px;
            z-index: 20;
        }

        .craft-title {
            color: #ffaa00;
            text-align: center;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .craft-item {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            margin: 5px 0;
            border-radius: 10px;
            border: 2px solid #ffaa00;
            cursor: pointer;
            font-size: 14px;
        }

        .craft-item:active {
            background: rgba(255,170,0,0.3);
        }

        #controls { 
            position: absolute; 
            bottom: 10px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 15px; 
            z-index: 20; 
            pointer-events: none;
        }

        #controls > div {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn { 
            width: 70px; 
            height: 70px; 
            background: #ff4444; 
            border: 3px solid #ffff00; 
            border-radius: 35px; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            box-shadow: 0 5px 0 #880000; 
        }

        .btn:active { 
            transform: translateY(5px);
            box-shadow: none;
        }

        #gas-btn {
            background: #44ff44;
            box-shadow: 0 5px 0 #008800;
        }

        #back-btn {
            background: #ffaa44;
            box-shadow: 0 5px 0 #885500;
        }

        #fire-btn {
            background: #ff0000;
            box-shadow: 0 5px 0 #880000;
        }

        #death-screen { 
            position: absolute; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            display: none; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index:200; 
            background: rgba(0,0,0,0.9); 
            color:white; 
            font-size: 60px; 
        }

        #restart-btn {
            padding: 15px 50px;
            background: #00ff00;
            border: 4px solid #ffff00;
            border-radius: 40px;
            font-size: 30px;
            margin-top: 30px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        #base-walls {
            position: absolute;
            border: 3px solid #00ff00;
            border-radius: 20px;
            box-shadow: 0 0 50px #00ff00;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="splash">
        <div class="logo">🧟 ZOMBIE SURVIVAL</div>
        <button id="startBtn">▶ СТАРТ</button>
    </div>

    <div id="game">
        <div id="ui">
            <div id="day-night">☀️ ДЕНЬ 1 | 12:00</div>
            <div>❤️ ЗДОРОВЬЕ</div>
            <div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div>
            <div>🍗 ГОЛОД</div>
            <div id="hunger-bar"><div id="hunger-fill" style="width:100%"></div></div>
        </div>

        <div id="zombie-count">🧟 0</div>

        <div id="inventory"></div>

        <div id="craft-menu">
            <div class="craft-title">🔨 КРАФТ</div>
            <div class="craft-item" onclick="craftItem('bat')">🪓 БИТА (2 дерева + 1 гвозди)</div>
            <div class="craft-item" onclick="craftItem('molotov')">🔥 МОЛОТОВ (1 бутылка + 1 бензин)</div>
            <div class="craft-item" onclick="craftItem('medkit')">💊 АПТЕЧКА (2 бинта + 1 спирт)</div>
        </div>

        <div id="controls">
            <div>
                <div class="btn" id="left-btn">←</div>
                <div class="btn" id="right-btn">→</div>
            </div>
            <div>
                <div class="btn" id="gas-btn">↑</div>
                <div class="btn" id="back-btn">↓</div>
                <div class="btn" id="fire-btn">⚔️</div>
            </div>
        </div>

        <div id="death-screen">
            <div>💀 ТЫ УМЕР 💀</div>
            <div id="restart-btn" onclick="restartGame()">⟲ ЗАНОВО</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (function() {
            // ====================== ПЕРЕМЕННЫЕ ======================
            let scene, camera, renderer, player;
            let zombies = [];
            let resources = [];
            let baseWalls = [];
            
            let hp = 100;
            let hunger = 100;
            let dayCount = 1;
            let timeOfDay = 12;
            let dayTime = true;
            
            // Инвентарь
            let inventory = new Array(8).fill(null).map(() => ({ item: null, count: 0 }));
            let selectedSlot = 0;
            
            // Предметы
            const items = {
                'wood': { name: 'Дерево', emoji: '🪵', stack: 20 },
                'nails': { name: 'Гвозди', emoji: '📌', stack: 20 },
                'bottle': { name: 'Бутылка', emoji: '🍾', stack: 10 },
                'gasoline': { name: 'Бензин', emoji: '⛽', stack: 10 },
                'bandage': { name: 'Бинт', emoji: '🩹', stack: 15 },
                'alcohol': { name: 'Спирт', emoji: '🧪', stack: 10 },
                'can': { name: 'Консервы', emoji: '🥫', stack: 15 },
                'bat': { name: 'Бита', emoji: '🪓', stack: 1, damage: 30 },
                'molotov': { name: 'Молотов', emoji: '🔥', stack: 5, damage: 50 },
                'medkit': { name: 'Аптечка', emoji: '💊', stack: 5, heal: 50 }
            };
            
            // Рецепты
            const recipes = {
                'bat': { wood: 2, nails: 1 },
                'molotov': { bottle: 1, gasoline: 1 },
                'medkit': { bandage: 2, alcohol: 1 }
            };
            
            let keys = { g: 0, b: 0, left: 0, right: 0 };
            let speed = 0;
            let cameraRot = 0;
            const MAP_SIZE = 250;

            // ====================== ИНВЕНТАРЬ ======================
            function initInventory() {
                const container = document.getElementById('inventory');
                container.innerHTML = '';
                
                for (let i = 0; i < 8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot' + (i === selectedSlot ? ' selected' : '');
                    
                    if (inventory[i].item) {
                        const item = items[inventory[i].item];
                        slot.innerHTML = `
                            <span>${item.emoji}</span>
                            <span class="slot-count">${inventory[i].count}</span>
                        `;
                    } else {
                        slot.innerHTML = '<span>⬜</span>';
                    }
                    
                    slot.onclick = () => selectSlot(i);
                    container.appendChild(slot);
                }
            }

            window.selectSlot = function(index) {
                selectedSlot = index;
                initInventory();
            };

            function addToInventory(item, count = 1) {
                for (let i = 0; i < 8; i++) {
                    if (inventory[i].item === item && inventory[i].count < (items[item]?.stack || 1)) {
                        inventory[i].count += count;
                        initInventory();
                        return true;
                    }
                }
                
                for (let i = 0; i < 8; i++) {
                    if (inventory[i].item === null) {
                        inventory[i].item = item;
                        inventory[i].count = count;
                        initInventory();
                        return true;
                    }
                }
                return false;
            }

            function removeFromInventory(item, count = 1) {
                for (let i = 0; i < 8; i++) {
                    if (inventory[i].item === item) {
                        inventory[i].count -= count;
                        if (inventory[i].count <= 0) {
                            inventory[i].item = null;
                            inventory[i].count = 0;
                        }
                        initInventory();
                        return true;
                    }
                }
                return false;
            }

            window.craftItem = function(recipeName) {
                const recipe = recipes[recipeName];
                if (!recipe) return;
                
                // Проверяем ресурсы
                for (let [res, need] of Object.entries(recipe)) {
                    let total = 0;
                    for (let i = 0; i < 8; i++) {
                        if (inventory[i].item === res) total += inventory[i].count;
                    }
                    if (total < need) {
                        alert(`Нужно ${need} ${res}`);
                        return;
                    }
                }
                
                // Забираем ресурсы
                for (let [res, need] of Object.entries(recipe)) {
                    removeFromInventory(res, need);
                }
                
                // Добавляем результат
                addToInventory(recipeName, 1);
            };

            // ====================== СОЗДАНИЕ МИРА ======================
            function createGameWorld() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);
                
                // Освещение
                const sunLight = new THREE.DirectionalLight(0xffffff, 1);
                sunLight.position.set(50, 100, 50);
                sunLight.castShadow = true;
                scene.add(sunLight);
                scene.add(new THREE.AmbientLight(0x404060));
                
                // Земля
                const groundGeo = new THREE.PlaneGeometry(600, 600);
                const groundMat = new THREE.MeshLambertMaterial({ color: 0x2a5a2a });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI/2;
                ground.position.y = -0.1;
                ground.receiveShadow = true;
                scene.add(ground);
                
                // БАЗА - теперь с коллизией!
                const baseCenter = new THREE.Vector3(0, 0, 0);
                
                // Стены базы (непроходимые)
                const wallPositions = [
                    [15, 0], [15, 5], [15, -5], [15, 10], [15, -10],
                    [-15, 0], [-15, 5], [-15, -5], [-15, 10], [-15, -10],
                    [0, 15], [5, 15], [-5, 15], [10, 15], [-10, 15],
                    [0, -15], [5, -15], [-5, -15], [10, -15], [-10, -15]
                ];
                
                wallPositions.forEach(pos => {
                    const wall = new THREE.Mesh(
                        new THREE.BoxGeometry(2, 4, 2),
                        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
                    );
                    wall.position.set(pos[0], 2, pos[1]);
                    wall.castShadow = true;
                    wall.receiveShadow = true;
                    
                    // Добавляем коллизию
                    wall.userData = {
                        collider: {
                            x: pos[0],
                            z: pos[1],
                            width: 2,
                            length: 2,
                            height: 4
                        }
                    };
                    
                    scene.add(wall);
                    baseWalls.push(wall);
                });
                
                // Зеленый круг базы
                const baseCircle = new THREE.Mesh(
                    new THREE.CylinderGeometry(18, 18, 0.1, 32),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.2 })
                );
                baseCircle.position.y = 0.05;
                scene.add(baseCircle);
                
                // Ресурсы
                for (let i = 0; i < 20; i++) {
                    const x = (Math.random() - 0.5) * 400;
                    const z = (Math.random() - 0.5) * 400;
                    if (Math.sqrt(x*x + z*z) > 25) { // Не спавним в базе
                        const types = ['wood', 'nails', 'bottle', 'gasoline', 'bandage', 'alcohol', 'can'];
                        const type = types[Math.floor(Math.random() * types.length)];
                        const resource = createResource(x, z, type);
                        scene.add(resource);
                        resources.push(resource);
                    }
                }
                
                // Игрок
                player = createRobloxHuman(0x44aaff);
                player.position.set(5, 0, 5);
                scene.add(player);
                
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(5, 10, 20);
                camera.lookAt(5, 1, 5);
            }

            function createRobloxHuman(color) {
                const group = new THREE.Group();
                
                // Голова (кубическая)
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: 0xffcc99 })
                );
                head.position.y = 1.8;
                head.castShadow = true;
                group.add(head);
                
                // Тело
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1.4, 0.4),
                    new THREE.MeshLambertMaterial({ color: color })
                );
                body.position.y = 0.9;
                body.castShadow = true;
                group.add(body);
                
                // Глаза
                const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.1);
                const eyeMat = new THREE.MeshLambertMaterial({ color: 0x000000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(-0.2, 2.0, 0.4);
                group.add(leftEye);
                
                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(0.2, 2.0, 0.4);
                group.add(rightEye);
                
                return group;
            }

            function createZombie(x, z) {
                const group = new THREE.Group();
                
                // Зеленый зомби
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1.6, 0.4),
                    new THREE.MeshLambertMaterial({ color: 0x44aa44 })
                );
                body.position.y = 0.8;
                body.castShadow = true;
                group.add(body);
                
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: 0x88aa88 })
                );
                head.position.y = 1.8;
                head.castShadow = true;
                group.add(head);
                
                // Красные глаза
                const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.1);
                const eyeMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(-0.2, 2.0, 0.4);
                group.add(leftEye);
                
                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(0.2, 2.0, 0.4);
                group.add(rightEye);
                
                group.position.set(x, 0, z);
                
                group.userData = {
                    health: 30,
                    speed: 0.03,
                    attackDamage: 10,
                    attackCooldown: 0
                };
                
                return group;
            }

            function createResource(x, z, type) {
                const group = new THREE.Group();
                
                const colors = {
                    'wood': 0x8B4513,
                    'nails': 0xC0C0C0,
                    'bottle': 0x00FF00,
                    'gasoline': 0xFFA500,
                    'bandage': 0xFFFFFF,
                    'alcohol': 0x87CEEB,
                    'can': 0xFFD700
                };
                
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: colors[type] || 0xCCCCCC })
                );
                box.position.y = 0.4;
                box.castShadow = true;
                group.add(box);
                
                // Свечение
                const glow = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5),
                    new THREE.MeshBasicMaterial({ color: colors[type], transparent: true, opacity: 0.2 })
                );
                glow.position.y = 0.4;
                group.add(glow);
                
                group.position.set(x, 0, z);
                
                group.userData = {
                    type: 'resource',
                    itemType: type,
                    collected: false
                };
                
                return group;
            }

            // ====================== АТАКА ======================
            window.attack = function() {
                if (!player) return;
                
                const weapon = inventory[selectedSlot].item;
                
                // Если нет оружия или это не оружие - бьем кулаками
                let damage = 10;
                
                if (weapon && items[weapon] && items[weapon].damage) {
                    damage = items[weapon].damage;
                    
                    // Если это молотов - особый эффект
                    if (weapon === 'molotov') {
                        removeFromInventory('molotov', 1);
                        throwMolotov();
                        return;
                    }
                    
                    // Если это аптечка - лечимся
                    if (weapon === 'medkit') {
                        hp = Math.min(100, hp + 50);
                        document.getElementById('hp-fill').style.width = hp + '%';
                        removeFromInventory('medkit', 1);
                        return;
                    }
                }
                
                // Ближний бой
                zombies.forEach((zombie, index) => {
                    const dist = player.position.distanceTo(zombie.position);
                    if (dist < 3) {
                        zombie.userData.health -= damage;
                        
                        if (zombie.userData.health <= 0) {
                            scene.remove(zombie);
                            zombies.splice(index, 1);
                            updateZombieCount();
                            
                            // Шанс выпадения ресурса
                            if (Math.random() < 0.3) {
                                addToInventory('can', 1);
                            }
                        }
                    }
                });
            };

            function throwMolotov() {
                // Создаем огненное поле
                const firePos = new THREE.Vector3(
                    player.position.x + Math.sin(player.rotation.y) * 5,
                    0,
                    player.position.z + Math.cos(player.rotation.y) * 5
                );
                
                const fire = new THREE.Mesh(
                    new THREE.CylinderGeometry(3, 3, 0.1, 16),
                    new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0.5 })
                );
                fire.position.copy(firePos);
                fire.position.y = 0.1;
                scene.add(fire);
                
                // Урон зомби
                zombies.forEach(zombie => {
                    if (zombie.position.distanceTo(firePos) < 4) {
                        zombie.userData.health -= 50;
                        if (zombie.userData.health <= 0) {
                            scene.remove(zombie);
                        }
                    }
                });
                
                setTimeout(() => scene.remove(fire), 2000);
            }

            // ====================== ОБНОВЛЕНИЕ ======================
            function updateZombies() {
                if (!player) return;
                
                // Спавн зомби ночью
                if (!dayTime && zombies.length < 10 + dayCount * 3) {
                    if (Math.random() < 0.01) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 40 + Math.random() * 50;
                        const x = player.position.x + Math.cos(angle) * dist;
                        const z = player.position.z + Math.sin(angle) * dist;
                        
                        const zombie = createZombie(x, z);
                        scene.add(zombie);
                        zombies.push(zombie);
                        updateZombieCount();
                    }
                }
                
                // Зомби горят на солнце ☀️
                if (dayTime) {
                    zombies.forEach(zombie => {
                        zombie.userData.health -= 0.05; // Медленно горят
                        if (zombie.userData.health <= 0) {
                            scene.remove(zombie);
                        }
                    });
                    // Фильтруем мертвых
                    zombies = zombies.filter(z => scene.children.includes(z));
                    updateZombieCount();
                }
                
                // Движение зомби к игроку
                zombies.forEach(zombie => {
                    if (!zombie.parent) return;
                    
                    const dist = player.position.distanceTo(zombie.position);
                    
                    if (dist < 20) {
                        const dx = player.position.x - zombie.position.x;
                        const dz = player.position.z - zombie.position.z;
                        const angle = Math.atan2(dx, dz);
                        
                        zombie.rotation.y = angle;
                        zombie.position.x += Math.sin(angle) * zombie.userData.speed;
                        zombie.position.z += Math.cos(angle) * zombie.userData.speed;
                        
                        // Атака
                        if (dist < 2) {
                            const now = Date.now();
                            if (now - zombie.userData.attackCooldown > 1000) {
                                hp -= zombie.userData.attackDamage;
                                document.getElementById('hp-fill').style.width = hp + '%';
                                zombie.userData.attackCooldown = now;
                                
                                if (hp <= 0) {
                                    document.getElementById('death-screen').style.display = 'flex';
                                }
                            }
                        }
                    }
                });
            }

            function updateResources() {
                if (!player) return;
                
                resources.forEach((resource, index) => {
                    if (resource.userData.collected) return;
                    
                    const dist = player.position.distanceTo(resource.position);
                    
                    if (dist < 2) {
                        addToInventory(resource.userData.itemType, 1);
                        scene.remove(resource);
                        resources.splice(index, 1);
                    }
                });
            }

            function checkCollisions() {
                if (!player) return false;
                
                // Проверка стен базы
                for (let wall of baseWalls) {
                    if (!wall.userData?.collider) continue;
                    
                    const collider = wall.userData.collider;
                    const halfW = collider.width / 2;
                    const halfL = collider.length / 2;
                    
                    if (player.position.x + 1 > collider.x - halfW &&
                        player.position.x - 1 < collider.x + halfW &&
                        player.position.z + 1 > collider.z - halfL &&
                        player.position.z - 1 < collider.z + halfL) {
                        return true;
                    }
                }
                
                // Границы карты
                if (Math.abs(player.position.x) > MAP_SIZE - 10 ||
                    Math.abs(player.position.z) > MAP_SIZE - 10) {
                    return true;
                }
                
                return false;
            }

            function updateDayNight() {
                timeOfDay += 0.002;
                
                if (timeOfDay >= 24) {
                    timeOfDay = 0;
                    dayCount++;
                }
                
                dayTime = timeOfDay >= 6 && timeOfDay < 20;
                
                const timeStr = Math.floor(timeOfDay) + ':' + 
                               Math.floor((timeOfDay % 1) * 60).toString().padStart(2, '0');
                document.getElementById('day-night').innerHTML = 
                    (dayTime ? '☀️' : '🌙') + ` ДЕНЬ ${dayCount} | ${timeStr}`;
                
                // Меняем освещение
                if (scene) {
                    scene.background.setHex(dayTime ? 0x87CEEB : 0x111122);
                }
            }

            function updateHunger() {
                hunger -= 0.002;
                
                if (hunger <= 0) {
                    hp -= 0.1;
                    document.getElementById('hp-fill').style.width = hp + '%';
                    hunger = 0;
                }
                
                // Автоматически едим, если есть консервы
                if (hunger < 30) {
                    for (let i = 0; i < 8; i++) {
                        if (inventory[i].item === 'can') {
                            inventory[i].count--;
                            if (inventory[i].count <= 0) {
                                inventory[i].item = null;
                            }
                            hunger = Math.min(100, hunger + 30);
                            initInventory();
                            break;
                        }
                    }
                }
                
                document.getElementById('hunger-fill').style.width = hunger + '%';
            }

            function updateZombieCount() {
                document.getElementById('zombie-count').innerHTML = '🧟 ' + zombies.length;
            }

            // ====================== ЗАПУСК ======================
            window.startGame = function() {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.getElementById('game').appendChild(renderer.domElement);
                
                createGameWorld();
                initInventory();
                
                // Управление
                document.getElementById('left-btn').ontouchstart = (e) => { e.preventDefault(); keys.left = 1; };
                document.getElementById('left-btn').ontouchend = () => keys.left = 0;
                
                document.getElementById('right-btn').ontouchstart = (e) => { e.preventDefault(); keys.right = 1; };
                document.getElementById('right-btn').ontouchend = () => keys.right = 0;
                
                document.getElementById('gas-btn').ontouchstart = (e) => { e.preventDefault(); keys.g = 1; };
                document.getElementById('gas-btn').ontouchend = () => keys.g = 0;
                
                document.getElementById('back-btn').ontouchstart = (e) => { e.preventDefault(); keys.b = 1; };
                document.getElementById('back-btn').ontouchend = () => keys.b = 0;
                
                document.getElementById('fire-btn').ontouchstart = (e) => { 
                    e.preventDefault(); 
                    attack();
                };
                
                function animate() {
                    requestAnimationFrame(animate);
                    
                    if (!player) return;
                    
                    updateDayNight();
                    updateHunger();
                    updateZombies();
                    updateResources();
                    
                    // Движение
                    if (keys.left) player.rotation.y += 0.05;
                    if (keys.right) player.rotation.y -= 0.05;
                    
                    if (keys.g) speed += 0.05;
                    else if (keys.b) speed -= 0.03;
                    else speed *= 0.9;
                    
                    speed = Math.max(-0.3, Math.min(0.5, speed));
                    
                    const prevX = player.position.x;
                    const prevZ = player.position.z;
                    
                    player.position.x += Math.sin(player.rotation.y) * speed;
                    player.position.z += Math.cos(player.rotation.y) * speed;
                    
                    // Проверка коллизий
                    if (checkCollisions()) {
                        player.position.x = prevX;
                        player.position.z = prevZ;
                        speed = 0;
                    }
                    
                    // Камера
                    camera.position.x = player.position.x - Math.sin(cameraRot) * 15;
                    camera.position.y = player.position.y + 8;
                    camera.position.z = player.position.z - Math.cos(cameraRot) * 15;
                    camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
                    
                    renderer.render(scene, camera);
                }
                
                animate();
            };

            window.restartGame = function() {
                document.getElementById('death-screen').style.display = 'none';
                
                while(scene.children.length > 0) scene.remove(scene.children[0]);
                
                hp = 100;
                hunger = 100;
                dayCount = 1;
                timeOfDay = 12;
                zombies = [];
                resources = [];
                baseWalls = [];
                inventory = new Array(8).fill(null).map(() => ({ item: null, count: 0 }));
                
                createGameWorld();
                initInventory();
            };

            document.getElementById('startBtn').addEventListener('click', startGame);
        })();
    </script>
</body>
