<!DOCTYPE html>
<html>
<head>
    <title>ZOMBIE SURVIVAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; color: white; font-family: Arial; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🧟 ZOMBIE SURVIVAL</h2>
        <p>ИГРА ЗАГРУЖАЕТСЯ...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ПРОСТАЯ ТЕСТОВАЯ СЦЕНА
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('info').innerHTML = '<h2>🧟 ZOMBIE SURVIVAL</h2><p>✅ ИГРА РАБОТАЕТ!</p>';
    </script>
</body>
</html>
