<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOMBIE SURVIVAL - РАБОЧИЙ МУЛЬТИПЛЕЕР</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Arial', sans-serif; 
            color: white;
        }
        
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a3a1a, #0a2a0a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .logo {
            font-size: 80px;
            font-weight: 900;
            color: #ffaa00;
            text-shadow: 5px 5px 0 #ff0000;
            margin-bottom: 20px;
        }

        #startBtn {
            padding: 20px 80px;
            background: #00ff00;
            border: none;
            border-radius: 50px;
            color: black;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #ffff00;
            box-shadow: 0 10px 0 #008800;
            transition: 0.05s linear;
        }

        #startBtn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 #008800;
        }

        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 1;
        }
        
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.8); 
            padding: 15px; 
            border-radius: 15px; 
            border: 3px solid #ffaa00; 
            z-index: 10;
            min-width: 200px;
        }
        
        #hp-bar { 
            width: 200px; 
            height: 20px; 
            background: #300; 
            border: 2px solid #f00; 
            border-radius: 10px; 
            margin: 5px 0;
            overflow: hidden;
        }
        
        #hp-fill { 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(90deg, #f00, #ff0, #0f0); 
        }

        #hunger-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            margin: 5px 0;
            overflow: hidden;
        }

        #hunger-fill {
            width: 100%;
            height: 100%;
            background: #ffaa00;
        }

        #day-night {
            font-size: 20px;
            color: #ffaa00;
            margin-bottom: 5px;
        }

        #zombie-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            border: 3px solid #f00;
            font-size: 24px;
            color: #f00;
        }

        #inventory {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 20px;
            border: 3px solid #ffaa00;
            z-index: 20;
        }

        .slot {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
            cursor: pointer;
        }

        .slot.selected {
            border-color: #00ffff;
            box-shadow: 0 0 20px #00ffff;
            transform: scale(1.05);
        }

        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 14px;
            background: #ffaa00;
            color: black;
            padding: 2px 5px;
            border-radius: 10px;
        }

        #craft-menu {
            position: absolute;
            bottom: 100px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #ffaa00;
            width: 250px;
            z-index: 20;
        }

        .craft-title {
            color: #ffaa00;
            text-align: center;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .craft-item {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            margin: 5px 0;
            border-radius: 10px;
            border: 2px solid #ffaa00;
            cursor: pointer;
            font-size: 14px;
        }

        .craft-item:active {
            background: rgba(255,170,0,0.3);
        }

        #mp-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 30px;
            border: 4px solid #ff44ff;
            z-index: 200;
            width: 350px;
            display: none;
            text-align: center;
        }

        #mp-menu h2 {
            color: #ff44ff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        #mp-menu input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            border: 3px solid #ff44ff;
            background: #222;
            color: white;
            font-size: 18px;
        }

        #mp-menu button {
            padding: 15px 30px;
            background: #ff44ff;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            border: 3px solid #ffff00;
        }

        #mp-menu button:active {
            transform: scale(0.95);
        }

        #my-id {
            color: #ff44ff;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
        }

        #player-list {
            margin: 20px 0;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .player-entry {
            padding: 8px;
            margin: 5px 0;
            background: #333;
            border-radius: 10px;
            color: #00ff00;
        }

        #controls { 
            position: absolute; 
            bottom: 10px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 15px; 
            z-index: 20; 
            pointer-events: none;
        }

        #controls > div {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn { 
            width: 70px; 
            height: 70px; 
            background: #ff4444; 
            border: 3px solid #ffff00; 
            border-radius: 35px; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            box-shadow: 0 5px 0 #880000; 
        }

        .btn:active { 
            transform: translateY(5px);
            box-shadow: none;
        }

        #gas-btn {
            background: #44ff44;
            box-shadow: 0 5px 0 #008800;
        }

        #back-btn {
            background: #ffaa44;
            box-shadow: 0 5px 0 #885500;
        }

        #fire-btn {
            background: #ff0000;
            box-shadow: 0 5px 0 #880000;
        }

        #mp-btn {
            background: #ff44ff;
            box-shadow: 0 5px 0 #880088;
        }

        #death-screen { 
            position: absolute; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            display: none; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index:200; 
            background: rgba(0,0,0,0.9); 
            color:white; 
            font-size: 60px; 
        }

        #restart-btn {
            padding: 15px 50px;
            background: #00ff00;
            border: 4px solid #ffff00;
            border-radius: 40px;
            font-size: 30px;
            margin-top: 30px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="splash">
        <div class="logo">🧟 ZOMBIE SURVIVAL</div>
        <button id="startBtn">▶ СТАРТ</button>
    </div>

    <div id="game">
        <div id="ui">
            <div id="day-night">☀️ ДЕНЬ 1 | 12:00</div>
            <div>❤️ ЗДОРОВЬЕ</div>
            <div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div>
            <div>🍗 ГОЛОД</div>
            <div id="hunger-bar"><div id="hunger-fill" style="width:100%"></div></div>
        </div>

        <div id="zombie-count">🧟 0</div>

        <div id="inventory"></div>

        <div id="craft-menu">
            <div class="craft-title">🔨 КРАФТ</div>
            <div class="craft-item" onclick="craftItem('bat')">🪓 БИТА (2 дерева + 1 гвозди)</div>
            <div class="craft-item" onclick="craftItem('molotov')">🔥 МОЛОТОВ (1 бутылка + 1 бензин)</div>
            <div class="craft-item" onclick="craftItem('medkit')">💊 АПТЕЧКА (2 бинта + 1 спирт)</div>
        </div>

        <div id="mp-menu">
            <h2>👥 МУЛЬТИПЛЕЕР</h2>
            <div>ТВОЙ ID:</div>
            <div id="my-id">...</div>
            <input id="peer-id" placeholder="ВВЕДИ ID ДРУГА">
            <button onclick="connectToPeer()">🔗 ПОДКЛЮЧИТЬСЯ</button>
            <button onclick="hostGame()">👑 СОЗДАТЬ КОМНАТУ</button>
            <div id="player-list"></div>
            <button onclick="toggleMPMenu()">❌ ЗАКРЫТЬ</button>
        </div>

        <div id="controls">
            <div>
                <div class="btn" id="left-btn">←</div>
                <div class="btn" id="right-btn">→</div>
            </div>
            <div>
                <div class="btn" id="mp-btn" onclick="toggleMPMenu()">👥</div>
                <div class="btn" id="gas-btn">↑</div>
                <div class="btn" id="back-btn">↓</div>
                <div class="btn" id="fire-btn">⚔️</div>
            </div>
        </div>

        <div id="death-screen">
            <div>💀 ТЫ УМЕР 💀</div>
            <div id="restart-btn" onclick="restartGame()">⟲ ЗАНОВО</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        (function() {
            // ====================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ======================
            let scene, camera, renderer, player;
            let zombies = [];
            let resources = [];
            let otherPlayers = new Map(); // id -> { mesh, name }
            
            let hp = 100;
            let hunger = 100;
            let dayCount = 1;
            let timeOfDay = 12;
            let dayTime = true;
            
            // Инвентарь
            let inventory = new Array(8).fill(null).map(() => ({ item: null, count: 0 }));
            let selectedSlot = 0;
            
            // Предметы
            const items = {
                'wood': { name: 'Дерево', emoji: '🪵', stack: 20 },
                'nails': { name: 'Гвозди', emoji: '📌', stack: 20 },
                'bottle': { name: 'Бутылка', emoji: '🍾', stack: 10 },
                'gasoline': { name: 'Бензин', emoji: '⛽', stack: 10 },
                'bandage': { name: 'Бинт', emoji: '🩹', stack: 15 },
                'alcohol': { name: 'Спирт', emoji: '🧪', stack: 10 },
                'can': { name: 'Консервы', emoji: '🥫', stack: 15 },
                'bat': { name: 'Бита', emoji: '🪓', stack: 1, damage: 30 },
                'molotov': { name: 'Молотов', emoji: '🔥', stack: 5, damage: 50 },
                'medkit': { name: 'Аптечка', emoji: '💊', stack: 5, heal: 50 }
            };
            
            // Рецепты
            const recipes = {
                'bat': { wood: 2, nails: 1 },
                'molotov': { bottle: 1, gasoline: 1 },
                'medkit': { bandage: 2, alcohol: 1 }
            };
            
            let keys = { g: 0, b: 0, left: 0, right: 0 };
            let speed = 0;
            let cameraRot = 0;
            const MAP_SIZE = 250;
            
            // МУЛЬТИПЛЕЕР
            let peer;
            let connections = [];
            let myId = '';
            let playerName = 'Игрок_' + Math.floor(Math.random() * 1000);
            let lastSentTime = 0;

            // ====================== ИНИЦИАЛИЗАЦИЯ МУЛЬТИПЛЕЕРА ======================
            function initMultiplayer() {
                // Создаем Peer с уникальным ID
                peer = new Peer();
                
                peer.on('open', (id) => {
                    myId = id;
                    document.getElementById('my-id').innerText = id.substring(0, 8);
                    console.log('Мой ID:', id);
                    
                    // Добавляем себя в список игроков
                    updatePlayerList();
                });
                
                peer.on('connection', (conn) => {
                    console.log('Кто-то подключился!');
                    
                    conn.on('open', () => {
                        console.log('Соединение открыто');
                        connections.push(conn);
                        
                        // Отправляем свой ID новому игроку
                        conn.send({
                            type: 'handshake',
                            id: myId,
                            name: playerName,
                            x: player ? player.position.x : 0,
                            z: player ? player.position.z : 0,
                            rot: player ? player.rotation.y : 0
                        });
                        
                        setupConnection(conn);
                        updatePlayerList();
                    });
                });
                
                // Переподключение при ошибках
                peer.on('disconnected', () => {
                    console.log('Отключился, переподключаюсь...');
                    peer.reconnect();
                });
            }

            function setupConnection(conn) {
                conn.on('data', (data) => {
                    handleNetworkData(conn, data);
                });
                
                conn.on('close', () => {
                    console.log('Соединение закрыто');
                    connections = connections.filter(c => c !== conn);
                    
                    // Удаляем игрока из сцены
                    if (otherPlayers.has(conn.peer)) {
                        scene.remove(otherPlayers.get(conn.peer).mesh);
                        otherPlayers.delete(conn.peer);
                    }
                    
                    updatePlayerList();
                });
                
                conn.on('error', (err) => {
                    console.log('Ошибка соединения:', err);
                });
            }

            window.hostGame = function() {
                // Просто открываем меню - уже готово
                alert('Твой ID: ' + myId + '\nОтправь его друзьям!');
            };

            window.connectToPeer = function() {
                const friendId = document.getElementById('peer-id').value;
                if (!friendId) {
                    alert('Введи ID друга!');
                    return;
                }
                
                console.log('Подключаемся к', friendId);
                
                const conn = peer.connect(friendId);
                
                conn.on('open', () => {
                    console.log('Подключились!');
                    connections.push(conn);
                    
                    // Отправляем свой ID
                    conn.send({
                        type: 'handshake',
                        id: myId,
                        name: playerName,
                        x: player ? player.position.x : 0,
                        z: player ? player.position.z : 0,
                        rot: player ? player.rotation.y : 0
                    });
                    
                    setupConnection(conn);
                    updatePlayerList();
                });
                
                conn.on('error', (err) => {
                    console.log('Ошибка подключения:', err);
                    alert('Не удалось подключиться. Проверь ID!');
                });
            };

            function handleNetworkData(conn, data) {
                if (!player) return;
                
                switch (data.type) {
                    case 'handshake':
                        // Новый игрок представился
                        console.log('Handshake от', data.id);
                        
                        // Создаем его модельку
                        const newPlayer = createOtherPlayer(data.name, 0xff44ff);
                        newPlayer.position.set(data.x, 0, data.z);
                        newPlayer.rotation.y = data.rot;
                        scene.add(newPlayer);
                        
                        otherPlayers.set(data.id, {
                            mesh: newPlayer,
                            name: data.name
                        });
                        
                        // Отправляем ему наше положение
                        conn.send({
                            type: 'pos',
                            x: player.position.x,
                            z: player.position.z,
                            rot: player.rotation.y
                        });
                        
                        // Отправляем всех зомби
                        zombies.forEach(zombie => {
                            conn.send({
                                type: 'zombie_spawn',
                                id: zombie.userData.id,
                                x: zombie.position.x,
                                z: zombie.position.z,
                                health: zombie.userData.health
                            });
                        });
                        
                        updatePlayerList();
                        break;
                        
                    case 'pos':
                        // Обновляем позицию другого игрока
                        if (otherPlayers.has(data.id)) {
                            const other = otherPlayers.get(data.id);
                            other.mesh.position.x = data.x;
                            other.mesh.position.z = data.z;
                            other.mesh.rotation.y = data.rot;
                        }
                        break;
                        
                    case 'zombie_spawn':
                        // Спавним зомби у всех
                        const existingZombie = zombies.find(z => z.userData.id === data.id);
                        if (!existingZombie) {
                            const zombie = createZombie(data.x, data.z);
                            zombie.userData.id = data.id;
                            zombie.userData.health = data.health;
                            scene.add(zombie);
                            zombies.push(zombie);
                            updateZombieCount();
                        }
                        break;
                        
                    case 'zombie_hit':
                        // Кто-то ударил зомби
                        const zombie = zombies.find(z => z.userData.id === data.id);
                        if (zombie) {
                            zombie.userData.health -= data.damage;
                            if (zombie.userData.health <= 0) {
                                scene.remove(zombie);
                                zombies = zombies.filter(z => z !== zombie);
                                updateZombieCount();
                            }
                        }
                        break;
                        
                    case 'resource_collect':
                        // Кто-то собрал ресурс
                        const res = resources.find(r => 
                            Math.abs(r.position.x - data.x) < 1 && 
                            Math.abs(r.position.z - data.z) < 1
                        );
                        if (res) {
                            scene.remove(res);
                            resources = resources.filter(r => r !== res);
                        }
                        break;
                        
                    case 'chat':
                        // Сообщение в чат (можно добавить)
                        console.log(data.name + ': ' + data.message);
                        break;
                }
            }

            function updatePlayerList() {
                const listDiv = document.getElementById('player-list');
                listDiv.innerHTML = '<div class="player-entry">👤 ' + playerName + ' (ты)</div>';
                
                connections.forEach(conn => {
                    if (otherPlayers.has(conn.peer)) {
                        const player = otherPlayers.get(conn.peer);
                        listDiv.innerHTML += '<div class="player-entry">👥 ' + player.name + '</div>';
                    }
                });
            }

            function broadcast(data) {
                connections.forEach(conn => {
                    if (conn.open) {
                        conn.send(data);
                    }
                });
            }

            // ====================== СОЗДАНИЕ ИГРОКА ДЛЯ ДРУГИХ ======================
            function createOtherPlayer(name, color) {
                const group = new THREE.Group();
                
                // Голова
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: 0xffcc99 })
                );
                head.position.y = 1.8;
                head.castShadow = true;
                group.add(head);
                
                // Тело
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1.4, 0.4),
                    new THREE.MeshLambertMaterial({ color: color })
                );
                body.position.y = 0.9;
                body.castShadow = true;
                group.add(body);
                
                // Имя над головой (можно добавить позже)
                
                return group;
            }

            // ====================== ИНВЕНТАРЬ ======================
            function initInventory() {
                const container = document.getElementById('inventory');
                container.innerHTML = '';
                
                for (let i = 0; i < 8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot' + (i === selectedSlot ? ' selected' : '');
                    
                    if (inventory[i].item) {
                        const item = items[inventory[i].item];
                        slot.innerHTML = `
                            <span>${item.emoji}</span>
                            <span class="slot-count">${inventory[i].count}</span>
                        `;
                    } else {
                        slot.innerHTML = '<span>⬜</span>';
                    }
                    
                    slot.onclick = () => selectSlot(i);
                    container.appendChild(slot);
                }
            }

            window.selectSlot = function(index) {
                selectedSlot = index;
                initInventory();
            };

            function addToInventory(item, count = 1) {
                for (let i = 0; i < 8; i++) {
                    if (inventory[i].item === item && inventory[i].count < (items[item]?.stack || 1)) {
                        inventory[i].count += count;
                        initInventory();
                        return true;
                    }
                }
                
                for (let i = 0; i < 8; i++) {
                    if (inventory[i].item === null) {
                        inventory[i].item = item;
                        inventory[i].count = count;
                        initInventory();
                        return true;
                    }
                }
                return false;
            }

            function removeFromInventory(item, count = 1) {
                for (let i = 0; i < 8; i++) {
                    if (inventory[i].item === item) {
                        inventory[i].count -= count;
                        if (inventory[i].count <= 0) {
                            inventory[i].item = null;
                            inventory[i].count = 0;
                        }
                        initInventory();
                        return true;
                    }
                }
                return false;
            }

            window.craftItem = function(recipeName) {
                const recipe = recipes[recipeName];
                if (!recipe) return;
                
                // Проверяем ресурсы
                for (let [res, need] of Object.entries(recipe)) {
                    let total = 0;
                    for (let i = 0; i < 8; i++) {
                        if (inventory[i].item === res) total += inventory[i].count;
                    }
                    if (total < need) {
                        alert(`Нужно ${need} ${res}`);
                        return;
                    }
                }
                
                // Забираем ресурсы
                for (let [res, need] of Object.entries(recipe)) {
                    removeFromInventory(res, need);
                }
                
                // Добавляем результат
                addToInventory(recipeName, 1);
                
                playSound('craft');
            };

            // ====================== СОЗДАНИЕ МИРА ======================
            function createGameWorld() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);
                
                // Освещение
                const sunLight = new THREE.DirectionalLight(0xffffff, 1);
                sunLight.position.set(50, 100, 50);
                sunLight.castShadow = true;
                scene.add(sunLight);
                scene.add(new THREE.AmbientLight(0x404060));
                
                // Земля
                const groundGeo = new THREE.PlaneGeometry(600, 600);
                const groundMat = new THREE.MeshLambertMaterial({ color: 0x2a5a2a });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI/2;
                ground.position.y = -0.1;
                ground.receiveShadow = true;
                scene.add(ground);
                
                // База (зеленый круг)
                const baseCircle = new THREE.Mesh(
                    new THREE.CylinderGeometry(15, 15, 0.1, 32),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.2 })
                );
                baseCircle.position.y = 0.05;
                scene.add(baseCircle);
                
                // Стены базы
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const x = Math.cos(angle) * 15;
                    const z = Math.sin(angle) * 15;
                    
                    const wall = new THREE.Mesh(
                        new THREE.BoxGeometry(2, 3, 2),
                        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
                    );
                    wall.position.set(x, 1.5, z);
                    wall.castShadow = true;
                    wall.receiveShadow = true;
                    scene.add(wall);
                }
                
                // Ресурсы
                for (let i = 0; i < 15; i++) {
                    const x = (Math.random() - 0.5) * 400;
                    const z = (Math.random() - 0.5) * 400;
                    if (Math.sqrt(x*x + z*z) > 20) {
                        const types = ['wood', 'nails', 'bottle', 'gasoline', 'bandage', 'alcohol', 'can'];
                        const type = types[Math.floor(Math.random() * types.length)];
                        const resource = createResource(x, z, type);
                        scene.add(resource);
                        resources.push(resource);
                    }
                }
                
                // Игрок
                player = createPlayer(0x44aaff);
                player.position.set(0, 0, 10);
                scene.add(player);
                
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 10, 20);
                camera.lookAt(0, 1, 10);
            }

            function createPlayer(color) {
                const group = new THREE.Group();
                
                // Голова
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: 0xffcc99 })
                );
                head.position.y = 1.8;
                head.castShadow = true;
                group.add(head);
                
                // Тело
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1.4, 0.4),
                    new THREE.MeshLambertMaterial({ color: color })
                );
                body.position.y = 0.9;
                body.castShadow = true;
                group.add(body);
                
                // Глаза
                const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.1);
                const eyeMat = new THREE.MeshLambertMaterial({ color: 0x000000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(-0.2, 2.0, 0.4);
                group.add(leftEye);
                
                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(0.2, 2.0, 0.4);
                group.add(rightEye);
                
                return group;
            }

            function createZombie(x, z) {
                const group = new THREE.Group();
                
                // Тело
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1.6, 0.4),
                    new THREE.MeshLambertMaterial({ color: 0x44aa44 })
                );
                body.position.y = 0.8;
                body.castShadow = true;
                group.add(body);
                
                // Голова
                const head = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: 0x88aa88 })
                );
                head.position.y = 1.8;
                head.castShadow = true;
                group.add(head);
                
                // Красные глаза
                const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.1);
                const eyeMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
                
                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(-0.2, 2.0, 0.4);
                group.add(leftEye);
                
                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(0.2, 2.0, 0.4);
                group.add(rightEye);
                
                group.position.set(x, 0, z);
                
                group.userData = {
                    id: Math.random().toString(36).substring(7),
                    health: 30,
                    speed: 0.03,
                    attackDamage: 10,
                    attackCooldown: 0
                };
                
                return group;
            }

            function createResource(x, z, type) {
                const group = new THREE.Group();
                
                const colors = {
                    'wood': 0x8B4513,
                    'nails': 0xC0C0C0,
                    'bottle': 0x00FF00,
                    'gasoline': 0xFFA500,
                    'bandage': 0xFFFFFF,
                    'alcohol': 0x87CEEB,
                    'can': 0xFFD700
                };
                
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.8, 0.8),
                    new THREE.MeshLambertMaterial({ color: colors[type] || 0xCCCCCC })
                );
                box.position.y = 0.4;
                box.castShadow = true;
                group.add(box);
                
                group.position.set(x, 0, z);
                
                group.userData = {
                    type: 'resource',
                    itemType: type,
                    id: Math.random().toString(36).substring(7)
                };
                
                return group;
            }

            // ====================== АТАКА ======================
            window.attack = function() {
                if (!player) return;
                
                const weapon = inventory[selectedSlot].item;
                
                // Если нет оружия - кулаки
                let damage = 10;
                
                if (weapon && items[weapon] && items[weapon].damage) {
                    damage = items[weapon].damage;
                    
                    if (weapon === 'molotov') {
                        removeFromInventory('molotov', 1);
                        throwMolotov();
                        return;
                    }
                    
                    if (weapon === 'medkit') {
                        hp = Math.min(100, hp + 50);
                        document.getElementById('hp-fill').style.width = hp + '%';
                        removeFromInventory('medkit', 1);
                        return;
                    }
                }
                
                // Ближний бой
                zombies.forEach((zombie, index) => {
                    const dist = player.position.distanceTo(zombie.position);
                    if (dist < 3) {
                        zombie.userData.health -= damage;
                        
                        // Отправляем урон всем
                        broadcast({
                            type: 'zombie_hit',
                            id: zombie.userData.id,
                            damage: damage
                        });
                        
                        if (zombie.userData.health <= 0) {
                            scene.remove(zombie);
                            zombies.splice(index, 1);
                            updateZombieCount();
                            
                            if (Math.random() < 0.3) {
                                addToInventory('can', 1);
                            }
                        }
                        
                        playSound('hit');
                    }
                });
            };

            function throwMolotov() {
                const firePos = new THREE.Vector3(
                    player.position.x + Math.sin(player.rotation.y) * 5,
                    0,
                    player.position.z + Math.cos(player.rotation.y) * 5
                );
                
                const fire = new THREE.Mesh(
                    new THREE.CylinderGeometry(3, 3, 0.1, 16),
                    new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0.5 })
                );
                fire.position.copy(firePos);
                fire.position.y = 0.1;
                scene.add(fire);
                
                zombies.forEach(zombie => {
                    if (zombie.position.distanceTo(firePos) < 4) {
                        zombie.userData.health -= 50;
                        
                        broadcast({
                            type: 'zombie_hit',
                            id: zombie.userData.id,
                            damage: 50
                        });
                        
                        if (zombie.userData.health <= 0) {
                            scene.remove(zombie);
                        }
                    }
                });
                
                setTimeout(() => scene.remove(fire), 2000);
            }

            // ====================== ОБНОВЛЕНИЕ ======================
            function updateZombies() {
                if (!player) return;
                
                // Спавн зомби ночью
                if (!dayTime && zombies.length < 10 + dayCount * 2) {
                    if (Math.random() < 0.01) {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 40 + Math.random() * 50;
                        const x = player.position.x + Math.cos(angle) * dist;
                        const z = player.position.z + Math.sin(angle) * dist;
                        
                        const zombie = createZombie(x, z);
                        scene.add(zombie);
                        zombies.push(zombie);
                        
                        // Отправляем всем
                        broadcast({
                            type: 'zombie_spawn',
                            id: zombie.userData.id,
                            x: x,
                            z: z,
                            health: 30
                        });
                        
                        updateZombieCount();
                    }
                }
                
                // Зомби горят на солнце
                if (dayTime) {
                    zombies.forEach(zombie => {
                        zombie.userData.health -= 0.05;
                        
                        broadcast({
                            type: 'zombie_hit',
                            id: zombie.userData.id,
                            damage: 0.05
                        });
                        
                        if (zombie.userData.health <= 0) {
                            scene.remove(zombie);
                        }
                    });
                    
                    zombies = zombies.filter(z => scene.children.includes(z));
                    updateZombieCount();
                }
                
                // Движение зомби к ближайшему игроку
                zombies.forEach(zombie => {
                    if (!zombie.parent) return;
                    
                    // Ищем ближайшего игрока
                    let closestDist = 1000;
                    let closestPlayer = player;
                    
                    // Проверяем других игроков
                    otherPlayers.forEach(other => {
                        const dist = zombie.position.distanceTo(other.mesh.position);
                        if (dist < closestDist) {
                            closestDist = dist;
                            closestPlayer = other.mesh;
                        }
                    });
                    
                    // Проверяем себя
                    const selfDist = zombie.position.distanceTo(player.position);
                    if (selfDist < closestDist) {
                        closestDist = selfDist;
                        closestPlayer = player;
                    }
                    
                    if (closestDist < 20) {
                        const dx = closestPlayer.position.x - zombie.position.x;
                        const dz = closestPlayer.position.z - zombie.position.z;
                        const angle = Math.atan2(dx, dz);
                        
                        zombie.rotation.y = angle;
                        zombie.position.x += Math.sin(angle) * zombie.userData.speed;
                        zombie.position.z += Math.cos(angle) * zombie.userData.speed;
                        
                        // Атака
                        if (closestDist < 2 && closestPlayer === player) {
                            const now = Date.now();
                            if (now - zombie.userData.attackCooldown > 1000) {
                                hp -= zombie.userData.attackDamage;
                                document.getElementById('hp-fill').style.width = hp + '%';
                                zombie.userData.attackCooldown = now;
                                
                                if (hp <= 0) {
                                    document.getElementById('death-screen').style.display = 'flex';
                                }
                            }
                        }
                    }
                });
            }

            function updateResources() {
                if (!player) return;
                
                resources.forEach((resource, index) => {
                    const dist = player.position.distanceTo(resource.position);
                    
                    if (dist < 2) {
                        addToInventory(resource.userData.itemType, 1);
                        scene.remove(resource);
                        resources.splice(index, 1);
                        
                        // Сообщаем всем, что ресурс собрали
                        broadcast({
                            type: 'resource_collect',
                            x: resource.position.x,
                            z: resource.position.z
                        });
                    }
                });
            }

            function updateDayNight() {
                timeOfDay += 0.002;
                
                if (timeOfDay >= 24) {
                    timeOfDay = 0;
                    dayCount++;
                }
                
                dayTime = timeOfDay >= 6 && timeOfDay < 20;
                
                const timeStr = Math.floor(timeOfDay) + ':' + 
                               Math.floor((timeOfDay % 1) * 60).toString().padStart(2, '0');
                document.getElementById('day-night').innerHTML = 
                    (dayTime ? '☀️' : '🌙') + ` ДЕНЬ ${dayCount} | ${timeStr}`;
                
                if (scene) {
                    scene.background.setHex(dayTime ? 0x87CEEB : 0x111122);
                }
            }

            function updateHunger() {
                hunger -= 0.0015;
                
                if (hunger <= 0) {
                    hp -= 0.1;
                    document.getElementById('hp-fill').style.width = hp + '%';
                    hunger = 0;
                }
                
                if (hunger < 30) {
                    for (let i = 0; i < 8; i++) {
                        if (inventory[i].item === 'can') {
                            inventory[i].count--;
                            if (inventory[i].count <= 0) {
                                inventory[i].item = null;
                            }
                            hunger = Math.min(100, hunger + 30);
                            initInventory();
                            break;
                        }
                    }
                }
                
                document.getElementById('hunger-fill').style.width = hunger + '%';
            }

            function updateZombieCount() {
                document.getElementById('zombie-count').innerHTML = '🧟 ' + zombies.length;
            }

            function playSound(type) {
                // Заглушка для звуков
            }

            // ====================== УПРАВЛЕНИЕ МЕНЮ ======================
            window.toggleMPMenu = function() {
                const menu = document.getElementById('mp-menu');
                menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
                
                if (menu.style.display === 'block') {
                    updatePlayerList();
                }
            };

            // ====================== ЗАПУСК ======================
            window.startGame = function() {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.getElementById('game').appendChild(renderer.domElement);
                
                createGameWorld();
                initInventory();
                initMultiplayer();
                
                // Управление
                document.getElementById('left-btn').ontouchstart = (e) => { e.preventDefault(); keys.left = 1; };
                document.getElementById('left-btn').ontouchend = () => keys.left = 0;
                
                document.getElementById('right-btn').ontouchstart = (e) => { e.preventDefault(); keys.right = 1; };
                document.getElementById('right-btn').ontouchend = () => keys.right = 0;
                
                document.getElementById('gas-btn').ontouchstart = (e) => { e.preventDefault(); keys.g = 1; };
                document.getElementById('gas-btn').ontouchend = () => keys.g = 0;
                
                document.getElementById('back-btn').ontouchstart = (e) => { e.preventDefault(); keys.b = 1; };
                document.getElementById('back-btn').ontouchend = () => keys.b = 0;
                
                document.getElementById('fire-btn').ontouchstart = (e) => { 
                    e.preventDefault(); 
                    attack();
                };
                
                function animate() {
                    requestAnimationFrame(animate);
                    
                    if (!player) return;
                    
                    updateDayNight();
                    updateHunger();
                    updateZombies();
                    updateResources();
                    
                    // Движение
                    if (keys.left) player.rotation.y += 0.05;
                    if (keys.right) player.rotation.y -= 0.05;
                    
                    if (keys.g) speed += 0.04;
                    else if (keys.b) speed -= 0.02;
                    else speed *= 0.9;
                    
                    speed = Math.max(-0.2, Math.min(0.4, speed));
                    
                    player.position.x += Math.sin(player.rotation.y) * speed;
                    player.position.z += Math.cos(player.rotation.y) * speed;
                    
                    // Границы
                    player.position.x = Math.max(-MAP_SIZE + 10, Math.min(MAP_SIZE - 10, player.position.x));
                    player.position.z = Math.max(-MAP_SIZE + 10, Math.min(MAP_SIZE - 10, player.position.z));
                    
                    // Отправка позиции в мультиплеер (раз в 50мс)
                    const now = Date.now();
                    if (now - lastSentTime > 50) {
                        broadcast({
                            type: 'pos',
                            id: myId,
                            x: player.position.x,
                            z: player.position.z,
                            rot: player.rotation.y
                        });
                        lastSentTime = now;
                    }
                    
                    // Камера
                    camera.position.x = player.position.x - Math.sin(cameraRot) * 15;
                    camera.position.y = player.position.y + 8;
                    camera.position.z = player.position.z - Math.cos(cameraRot) * 15;
                    camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
                    
                    renderer.render(scene, camera);
                }
                
                animate();
            };

            window.restartGame = function() {
                document.getElementById('death-screen').style.display = 'none';
                
                hp = 100;
                hunger = 100;
                document.getElementById('hp-fill').style.width = '100%';
                document.getElementById('hunger-fill').style.width = '100%';
                
                player.position.set(0, 0, 10);
            };

            document.getElementById('startBtn').addEventListener('click', startGame);
        })();
    </script>
